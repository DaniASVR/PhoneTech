services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: phonetech_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=phonetech
      - DB_PASSWORD=phonetech_pass
      - DB_NAME=phonetech_db

  db:
    image: mysql:8.0
    container_name: phonetech_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=phonetech_db
      - MYSQL_USER=phonetech
      - MYSQL_PASSWORD=phonetech_pass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
